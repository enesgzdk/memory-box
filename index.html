<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Memory Box</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div style="display: flex; align-items: center; gap: 12px;">
                <h1>Memory Box</h1>
                <button id="power-btn" class="power-icon-btn on" aria-label="Power">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"></path><line x1="12" y1="2" x2="12" y2="12"></line></svg>
                </button>
                <button id="cal-btn" class="cal-icon-btn" aria-label="Calibrate">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                </button>
            </div>
            <div class="status-indicator" id="connection-status">
                <span class="dot"></span>
                <span class="text">Bağlanıyor...</span>
            </div>
        </header>

        <!-- Main 3D Prism Area -->
        <main class="prism-section">
            <button class="nav-btn left-btn" id="prev-btn" aria-label="Previous Photo">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            </button>
            
            <div class="prism-container">
                <div class="prism" id="prism">
                    <!-- Images will be injected here by JS -->
                </div>
            </div>

            <button class="nav-btn right-btn" id="next-btn" aria-label="Next Photo">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
            </button>
        </main>

        <div class="index-display" id="index-display">1 / 8</div>

        <!-- Control Panel Area -->
        <footer class="control-panel">
            <div class="control-group">
                <div class="control-header">
                    <label for="speed-slider">Dönüş Hızı</label>
                    <span class="speed-value" id="speed-value">20</span>
                </div>
                <input type="range" id="speed-slider" min="10" max="80" value="20" class="slider">
            </div>

            <div class="divider"></div>

            <div class="control-group row-group">
                <label for="led-toggle">LED Işıkları</label>
                <label class="switch">
                    <input type="checkbox" id="led-toggle" checked>
                    <span class="slider-toggle round"></span>
                </label>
            </div>
        </footer>
    </div>

    <!-- Calibration Modal -->
    <div id="calibration-modal" class="modal-overlay">
        <div class="modal-content">
            <h2 class="modal-title">Kalibrasyon</h2>
            <p class="modal-text">Lütfen kutunun üzerindeki fiziksel fotoğraf ile ekranda görünen fotoğrafın aynı olduğuna emin olun. Bu işlem cihazı ekrandaki duruma senkronize edecektir.</p>
            <div class="modal-actions">
                <button id="cal-cancel-btn" class="btn-secondary">İptal</button>
                <button id="cal-confirm-btn" class="btn-primary">Kalibre Et</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK (Compat version for local file:// usage) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
    
    <!-- App Logic -->
    <script src="app.js"></script>
</body>
</html>
